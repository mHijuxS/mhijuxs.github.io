<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Excalidraw renderer harness</title>
  <style>
    html, body { margin: 0; padding: 0; background: #ffffff; font-family: sans-serif; }
    #status { position: fixed; top: 8px; left: 8px; color: #666; font-size: 12px; }
  </style>

  </script>
